<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Todo List</h1>
        <a th:href="@{/todo/new}" class="btn btn-primary">&#26032;&#35215;&#30331;&#37682;</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show flash-alert" role="alert">
        <span th:text="${successMessage}">Success</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show flash-alert" role="alert">
        <span th:text="${errorMessage}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th scope="col" class="text-center" style="width: 100px;">ID</th>
                    <th scope="col">&#12479;&#12452;&#12488;&#12523;</th>
                    <th scope="col" style="width: 160px;">&#23436;&#20102;&#29366;&#24907;</th>
                    <th scope="col" class="text-center" style="width: 260px;">&#25805;&#20316;</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(todos)}">
                    <td colspan="4" class="text-center text-muted py-4">No todos found</td>
                </tr>
                <tr th:each="todo : ${todos}">
                    <td class="text-center" th:text="${todo.id}">1</td>
                    <td>
                        <span th:if="${todo.completed}" class="text-decoration-line-through text-muted"
                              th:text="${todo.title}">Sample todo</span>
                        <span th:unless="${todo.completed}" th:text="${todo.title}">Sample todo</span>
                    </td>
                    <td>
                        <span th:if="${todo.completed}">&#23436;&#20102;</span>
                        <span th:unless="${todo.completed}">&#26410;&#23436;&#20102;</span>
                    </td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-1">
                            <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-outline-success btn-sm"
                                        th:text="${todo.completed} ? '&#26410;&#23436;&#20102;&#12395;&#25147;&#12377;' : '&#23436;&#20102;&#12395;&#12377;&#12427;'">&#23436;&#20102;&#12395;&#12377;&#12427;</button>
                            </form>
                            <a th:href="@{/todo/{id}/edit(id=${todo.id})}" class="btn btn-outline-primary btn-sm">&#32232;&#38598;</a>
                            <form th:action="@{/todo/{id}/delete(id=${todo.id})}"
                                  method="post"
                                  class="d-inline"
                                  onsubmit="return confirm('&#26412;&#24403;&#12395;&#21066;&#38500;&#12375;&#12414;&#12377;&#12363;&#65311;');">
                                <button type="submit" class="btn btn-danger btn-sm">&#21066;&#38500;</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
    setTimeout(function () {
        document.querySelectorAll('.flash-alert').forEach(function (el) {
            var alert = bootstrap.Alert.getOrCreateInstance(el);
            alert.close();
        });
    }, 3000);
</script>
</body>
</html>
